# Home Assistant Supervisor add-on manifest (HAOS / Supervised path).
#
# Uses the prebuilt multi-arch image published to GHCR by CI — "same
# image, two paths" (the other path is ../deploy/docker-compose.yaml).
# Supervisor pulls `image` + ":{version}" rather than building from the
# Dockerfile.
#
# This file is the contract Supervisor reads. The release workflow
# (.github/workflows/release.yml, tag v*) stamps `version` from the tag
# and publishes this directory (config.yaml, DOCS.md, CHANGELOG.md)
# into the public locale-homeassistant repo, which doubles as the
# Supervisor add-on store (repository.yaml at its root) alongside its
# HACS role. `version` here stays "0.0.0" in source — the tag is the
# single source of truth.
name: Locale
slug: locale_ha_addon
version: "0.1.12"
description: >-
  Locale hub for Home Assistant — holds the platform connection and HA's
  signing key, discovers Locale devices on the LAN, serves them time, and
  bridges them to the Locale Home Assistant integration.
url: "https://github.com/locale-systems/locale-ha-addon"

# Supervisor expands {arch} and appends ":{version}". Per-arch image repos
# (aarch64-…, amd64-…) are the HA add-on convention; the release workflow
# publishes them (plus the multi-arch manifest the compose path uses).
image: "ghcr.io/locale-systems/{arch}-locale-ha-addon"
arch:
  - aarch64
  - amd64

init: false

# mDNS discovery + serving SNTP to LAN devices need L2 reach.
host_network: true

# Supervisor delivers these as /data/options.json; config.Load reads that
# file directly and overlays it on the env defaults (no entrypoint shim).
# SUPERVISOR_TOKEN is injected as env regardless, so token-mode detection
# works independently.
options:
  log_level: info
  sntp_advertise: ""
  telemetry_advertise: ""
  platform_url: ""
schema:
  log_level: "list(debug|info|warn|error)?"
  # When set, the add-on provisions each adopted device to use it.
  # sntp_advertise: host:port the device should use as its ntp_server
  #   (the add-on's SNTP server) — e.g. "192.168.1.10:1123".
  # telemetry_advertise: https URL the device should post telemetry to
  #   (the add-on's telemetry hub) + telemetry_root_tls=true — e.g.
  #   "https://192.168.1.10:8443". Use the HA host's LAN address (the
  #   DEVICE dials it), not localhost. Empty = leave the device's own
  #   NTP/telemetry config untouched.
  sntp_advertise: "str?"
  telemetry_advertise: "str?"
  # platform_url: Locale cloud base URL (e.g.
  #   "https://platform.localesystems.com"). Enables firmware/OTA — the
  #   add-on mints a device-scoped provision token from it (same open
  #   mechanism iOS uses) and reads the firmware registry; no platform
  #   credential is stored here or in the integration. Empty = no OTA.
  platform_url: "str?"
