# Home Assistant Supervisor add-on manifest (HAOS / Supervised path).
#
# Uses the prebuilt multi-arch image published to GHCR by CI — "same
# image, two paths" (the other path is ../deploy/docker-compose.yaml).
# Supervisor pulls `image` + ":{version}" rather than building from the
# Dockerfile.
#
# This file is the contract Supervisor reads. The release workflow
# (.github/workflows/release.yml, tag v*) stamps `version` from the tag
# and publishes this directory (config.yaml, DOCS.md, plus a CHANGELOG.md
# generated from the release tags) into the public locale-homeassistant
# repo, which doubles as the
# Supervisor add-on store (repository.yaml at its root) alongside its
# HACS role. `version` here stays "0.0.0" in source — the tag is the
# single source of truth.
name: Locale
slug: locale_ha_addon
version: "0.6.2"
description: >-
  Locale hub for Home Assistant — holds the platform connection and HA's
  signing key, discovers Locale devices on the LAN, serves them time, and
  bridges them to the Locale Home Assistant integration.
url: "https://github.com/locale-systems/locale-ha-addon"

# Supervisor expands {arch} and appends ":{version}". Per-arch image repos
# (aarch64-…, amd64-…) are the HA add-on convention; the release workflow
# publishes them (plus the multi-arch manifest the compose path uses).
image: "ghcr.io/locale-systems/{arch}-locale-ha-addon"
arch:
  - aarch64
  - amd64

init: false

# mDNS discovery + serving SNTP to LAN devices need L2 reach.
host_network: true

# Setup UI via Supervisor ingress (docs/addon-pairing.md §4): the SAME
# minimal /pair page a standalone install reaches by hostname, here a
# sidebar panel with HA-admin auth for free — no host/port/path to type.
# ingress_port is the UI port the add-on serves (ADDON_UI_ADDR, default
# :8088); keep it free on the host (host_network). Setup-only page — this
# is the only Supervisor coupling, and it is benign.
ingress: true
ingress_port: 8088
panel_icon: mdi:link-variant
panel_title: Locale Pairing

# Supervisor discovery (Workstream C, docs/addon-pairing.md §7): the add-on
# publishes a private discovery message offering the integration its host/port
# + API token, so the HAOS/Supervised user pastes nothing. UNVERIFIED on a live
# Supervisor — the integration also discovers via zeroconf (_locale-addon._tcp)
# and the manual host/port/token path remains. The `service` is the
# integration's domain.
discovery:
  - locale

# Supervisor delivers these as /data/options.json; config.Load reads that
# file directly and overlays it on the env defaults (no entrypoint shim).
# SUPERVISOR_TOKEN is injected as env regardless, so token-mode detection
# works independently.
options:
  log_level: info
  sntp_advertise: ""
  telemetry_advertise: ""
  platform_url: "https://api.localesystems.com"
  platform_mux_addr: ""
  telemetry_forward: true
schema:
  log_level: "list(debug|info|warn|error)?"
  # When set, the add-on provisions each adopted device to use it.
  # sntp_advertise: host:port the device should use as its ntp_server
  #   (the add-on's SNTP server) — e.g. "192.168.1.10:1123".
  # telemetry_advertise: https URL the device should post telemetry to
  #   (the add-on's telemetry hub) + telemetry_root_tls=true — e.g.
  #   "https://192.168.1.10:8443". Use the HA host's LAN address (the
  #   DEVICE dials it), not localhost. Empty = leave the device's own
  #   NTP/telemetry config untouched. Can't be defaulted (site-specific);
  #   the add-on logs the recommended values for your network at startup.
  sntp_advertise: "str?"
  telemetry_advertise: "str?"
  # platform_url: Locale cloud base URL. Defaults to the Locale cloud
  #   ("https://api.localesystems.com") so firmware/OTA works out of the
  #   box — override only for dev/self-host. The add-on mints a
  #   device-scoped provision token from it (same open mechanism iOS uses)
  #   and reads the firmware registry; no platform credential is stored
  #   here or in the integration. Empty = no OTA.
  platform_url: "str?"
  # platform_mux_addr: the platform's LMUX ingress endpoint (host:port,
  #   e.g. "api.localesystems.com:9443") — the raw-TLS mux port the add-on
  #   dials for its persistent cloud tunnel (roster registration + remote
  #   entity/management requests), authenticated by its role:ha carrier
  #   identity. Sits beside platform_url (same hostname, dedicated mux
  #   port). Empty = the cloud tunnel leg is disabled; firmware/OTA via
  #   platform_url is unaffected.
  platform_mux_addr: "str?"
  # telemetry_forward: forward device telemetry to the Locale cloud under a
  #   home-token (HA-bridged tier). Only takes effect once this Home is
  #   connected to the cloud from the iOS app (an HA service credential is
  #   registered) — with no credential nothing is forwarded regardless.
  #   Set false to keep telemetry local even after connecting.
  telemetry_forward: "bool?"
